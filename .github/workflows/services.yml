name: Run Firmware Mirror

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: "Paste link OTA Oplus (downloadCheck URL)"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Install PycURL
        run: pip install pycurl --break-system-packages || pip install pycurl

      - name: Bypass downloadCheck & Download ROM
        run: |
          python3 << 'EOF'
          import pycurl, json, os
          from io import BytesIO

          ota_url = os.environ["OTA_URL"]
          print(f"🔍 Fetching: {ota_url}")

          # Fetch JSON
          buf = BytesIO()
          c = pycurl.Curl()
          c.setopt(c.URL, ota_url)
          c.setopt(c.WRITEDATA, buf)
          c.setopt(c.FOLLOWLOCATION, True)
          c.setopt(c.USERAGENT, "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36")
          c.setopt(c.SSL_VERIFYPEER, False)
          c.setopt(c.TIMEOUT, 30)
          c.perform()
          c.close()

          response = buf.getvalue().decode("utf-8")
          print(f"📄 Response: {response[:300]}")

          data = json.loads(response)

          # Cari direct URL
          direct_url = None
          for key in ["url", "downUrl", "download_url", "downloadUrl", "fileUrl"]:
              if key in data and data[key]:
                  direct_url = data[key]
                  print(f"✅ Direct URL ditemukan di field '{key}'")
                  break

          if not direct_url:
              raise Exception(f"❌ Gagal dapat URL! Response: {response}")

          print(f"🔗 URL: {direct_url}")

          # Tentukan nama file
          file_name = direct_url.split("/")[-1].split("?")[0]
          if not file_name.endswith(".zip"):
              file_name = "oplus_rom.zip"
          print(f"📁 Nama file: {file_name}")

          # Simpan nama file buat step berikutnya
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"ROM_FILENAME={file_name}\n")
              f.write(f"DIRECT_URL={direct_url}\n")

          # Download ROM
          print(f"⬇️ Mulai download...")
          with open(file_name, "wb") as f:
              c = pycurl.Curl()
              c.setopt(c.URL, direct_url)
              c.setopt(c.WRITEDATA, f)
              c.setopt(c.FOLLOWLOCATION, True)
              c.setopt(c.USERAGENT, "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36")
              c.setopt(c.SSL_VERIFYPEER, False)
              c.perform()
              status = c.getinfo(c.RESPONSE_CODE)
              c.close()

          if status >= 400:
              raise Exception(f"❌ Download gagal! HTTP {status}")

          size = os.path.getsize(file_name)
          print(f"✅ Download selesai! Ukuran: {size / 1024 / 1024:.2f} MB")
          EOF
        env:
          OTA_URL: ${{ github.event.inputs.ota_url }}

      - name: Upload ke GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ROM_FILENAME }}
          path: ${{ env.ROM_FILENAME }}
          retention-days: 7
